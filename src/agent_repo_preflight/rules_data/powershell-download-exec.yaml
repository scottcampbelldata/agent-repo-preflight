id: powershell-download-exec
name: PowerShell downloads a file during setup
severity: low
category: dangerous-commands
blast_radius:
- network
match:
  facts:
  - content.ps_download_file
explanation: A PowerShell script downloads a file from the network during setup (e.g. an
  installer). Often legitimate, but worth confirming the source URL and what is done with the
  downloaded file.
remediation: Verify the download URL and that the fetched file is checksum-verified before use.
references:
- https://attack.mitre.org/techniques/T1105/
