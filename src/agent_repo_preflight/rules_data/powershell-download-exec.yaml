id: powershell-download-exec
name: PowerShell downloads or launches external content
severity: medium
category: dangerous-commands
blast_radius:
- network
- shell
match:
  facts:
  - content.invoke_webrequest
  - content.start_process
explanation: '`Invoke-WebRequest`/`Invoke-RestMethod`/`Start-Process` can fetch and launch external executables
  during setup.'
remediation: Verify the URLs and binaries involved. Avoid running on an untrusted machine.
references:
- https://attack.mitre.org/techniques/T1059/001/
