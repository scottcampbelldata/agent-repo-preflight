id: node-lifecycle-script-present
name: Package defines an npm install lifecycle script
severity: medium
category: install-hooks
blast_radius:
- install_hooks
- shell
match:
  facts:
  - pkg.lifecycle_script
explanation: The package declares an install lifecycle script that executes automatically during `npm
  install`, before any code is reviewed. Even benign-looking scripts run with the developer's privileges.
remediation: Review the script. Prefer `npm install --ignore-scripts` when onboarding an unfamiliar package.
references:
- https://docs.npmjs.com/cli/v10/using-npm/scripts
