id: broad-env-secret-request
name: Env template requests broad secrets
severity: medium
category: secrets
blast_radius:
- secrets
match:
  facts:
  - secret.broad_env_request
explanation: The .env template requests powerful, broad-scope secrets (cloud keys, tokens, private keys).
  Supplying these to an unreviewed project risks credential theft.
remediation: Provide only narrowly-scoped, disposable credentials. Question why broad secrets are needed.
references:
- https://attack.mitre.org/techniques/T1552/001/
