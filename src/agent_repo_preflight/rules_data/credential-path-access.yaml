id: credential-path-access
name: Reads sensitive credential paths
severity: high
category: secrets
blast_radius:
- secrets
- filesystem
match:
  facts:
  - content.cred_path_read
explanation: The code references sensitive credential locations (~/.ssh, ~/.aws, .npmrc, .pypirc, browser
  login data). Reading these during setup can exfiltrate secrets.
remediation: Confirm there is a legitimate reason to access these paths. Run in an isolated environment
  without real credentials.
references:
- https://attack.mitre.org/techniques/T1552/
