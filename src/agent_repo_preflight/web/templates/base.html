<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Repo Preflight{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark">⛫</span> Agent Repo Preflight
    </a>
    <nav>
      <a href="/">Scan</a>
      <a href="/examples">Examples</a>
      <a href="/rules">Rules</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>Detects repo-level risk indicators before AI agents execute setup, install, CI,
       MCP, or instruction files. <strong>It does not prove a repository is safe.</strong></p>
    <p>Never executes target repository code.</p>
  </footer>
</body>
</html>
